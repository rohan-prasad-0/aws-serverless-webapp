<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWS Contact Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #312e81
    );
}

.card{
    width:100%;
    max-width:550px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:24px;
    padding:35px;
    color:white;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
    animation:fadeIn .6s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    width:75px;
    height:75px;
    margin:auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    background:rgba(255,255,255,.15);
}

h1{
    text-align:center;
    margin-top:15px;
}

.subtitle{
    text-align:center;
    color:rgba(255,255,255,.75);
    margin:10px 0 25px;
}

.field{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

input,
textarea{
    width:100%;
    border:none;
    outline:none;
    padding:14px;
    border-radius:12px;
    background:rgba(255,255,255,.12);
    color:white;
    font-size:15px;
}

input::placeholder,
textarea::placeholder{
    color:rgba(255,255,255,.55);
}

textarea{
    resize:none;
    min-height:140px;
}

.counter{
    text-align:right;
    margin-top:6px;
    font-size:12px;
    color:rgba(255,255,255,.7);
}

button{
    width:100%;
    border:none;
    border-radius:12px;
    padding:15px;
    background:white;
    color:#1e3a8a;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

button:disabled{
    opacity:.7;
    cursor:not-allowed;
}

.spinner{
    width:16px;
    height:16px;
    border:2px solid rgba(0,0,0,.2);
    border-top:2px solid #1e3a8a;
    border-radius:50%;
    display:inline-block;
    vertical-align:middle;
    margin-right:8px;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.toast{
    position:fixed;
    top:20px;
    right:20px;
    min-width:260px;
    padding:15px 20px;
    border-radius:12px;
    color:white;
    transform:translateX(400px);
    transition:.4s;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.toast.show{
    transform:translateX(0);
}

.success{
    background:#16a34a;
}

.error{
    background:#dc2626;
}

@media(max-width:600px){
    .card{
        padding:25px;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">✉️</div>

    <h1>Contact Us</h1>

    <p class="subtitle">
        We'd love to hear from you. Send us a message.
    </p>

    <div class="field">
        <label>Name</label>
        <input
            id="name"
            placeholder="John Doe">
    </div>

    <div class="field">
        <label>Email</label>
        <input
            id="email"
            type="email"
            placeholder="john@example.com">
    </div>

    <div class="field">
        <label>Message</label>

        <textarea
            id="message"
            maxlength="500"
            placeholder="Write your message here..."></textarea>

        <div class="counter" id="counter">
            0 / 500
        </div>
    </div>

    <button id="btn" onclick="send()">
        Send Message
    </button>

</div>

<div id="toast" class="toast"></div>

<script>

const API_URL =
"https://YOUR_API_GATEWAY_URL";

const messageField =
document.getElementById("message");

messageField.addEventListener("input", () => {

    document.getElementById("counter").innerText =
        `${messageField.value.length} / 500`;
});

function validateEmail(email){

    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function showToast(message,type){

    const toast =
    document.getElementById("toast");

    toast.className =
    "toast " + type + " show";

    toast.innerText = message;

    setTimeout(()=>{
        toast.classList.remove("show");
    },3000);
}

async function send(){

    const btn =
    document.getElementById("btn");

    const name =
    document.getElementById("name")
    .value.trim();

    const email =
    document.getElementById("email")
    .value.trim();

    const message =
    document.getElementById("message")
    .value.trim();

    if(!name || !email || !message){

        showToast(
            "Please fill all fields",
            "error"
        );

        return;
    }

    if(!validateEmail(email)){

        showToast(
            "Please enter a valid email",
            "error"
        );

        return;
    }

    btn.disabled = true;

    btn.innerHTML =
    '<span class="spinner"></span>Sending...';

    try{

        const response =
        await fetch(API_URL,{

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                name,
                email,
                message,

                submittedAt:
                new Date().toISOString()

            })
        });

        if(!response.ok){
            throw new Error();
        }

        showToast(
            "Message sent successfully!",
            "success"
        );

        document
        .getElementById("name")
        .value = "";

        document
        .getElementById("email")
        .value = "";

        document
        .getElementById("message")
        .value = "";

        document
        .getElementById("counter")
        .innerText = "0 / 500";

    }
    catch(error){

        showToast(
            "Failed to send message",
            "error"
        );
    }

    btn.disabled = false;

    btn.innerHTML =
    "Send Message";
}
</script>

</body>
</html>
